name: Frontend CI

on:
  push:
    branches: [main, master]
    paths: ['gosso-admin-frontend/**']
  pull_request:
    branches: [main, master]
    paths: ['gosso-admin-frontend/**']

jobs:
  quality:
    name: Lint, Typecheck, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gosso-admin-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gosso-admin-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build
