name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gosso-admin-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gosso-admin-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Unit tests
        run: npm run test:run

      - name: Build
        run: npm run build

      - name: Build subpath variant
        run: VITE_APP_BASE_PATH=/identity-admin npm run build

  seed:
    name: Seed quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: seed

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: seed/go.mod
          cache-dependency-path: seed/go.sum

      - name: Verify go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...

  compose:
    name: Compose and preflight
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare local signing key
        run: |
          mkdir -p keys
          openssl genpkey -algorithm RSA -out keys/private.pem -pkeyopt rsa_keygen_bits:2048
          chmod 600 keys/private.pem

      - name: Development preflight
        run: ./scripts/preflight.sh development

      - name: Docker Compose config validation
        run: docker compose config

      - name: Source override Compose config validation
        run: docker compose -f docker-compose.yml -f docker-compose.source.yml config
